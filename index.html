<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Ponto</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            margin: 0;
            font-family: "Inter", sans-serif;
            background: #f4f6f9;
            color: #333;
        }

        header {
            background: #1a73e8;
            padding: 20px;
            color: white;
            text-align: center;
            font-size: 22px;
            font-weight: 600;
        }

        .container {
            max-width: 900px;
            margin: 30px auto;
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }

        h2 {
            margin-top: 0;
            font-weight: 600;
        }

        button {
            padding: 12px 18px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 600;
            transition: 0.2s;
        }

        .btn-primary { background: #1a73e8; color: white; }
        .btn-primary:hover { background: #0c56c0; }

        .btn-danger { background: #d93025; color: white; }
        .btn-danger:hover { background: #b02018; }

        .btn-green { background: #34a853; color: white; }
        .btn-green:hover { background: #1e7e34; }

        .btn-gray { background: #5f6368; color: white; }
        .btn-gray:hover { background: #3c4043; }

        input, select {
            width: 100%;
            padding: 12px;
            margin-top: 8px;
            margin-bottom: 15px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 15px;
        }

        .hidden { display: none; }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        table th, table td {
            padding: 12px;
            border-bottom: 1px solid #ddd;
            text-align: left;
        }

        table th {
            background: #f1f3f4;
            font-weight: 600;
        }

        .center {
            text-align: center;
        }

        .actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
    </style>
</head>

<body>

<header>Sistema de Ponto — Controle Completo</header>

<div class="container" id="loginContainer">
    <h2>Login</h2>
    <input type="email" id="loginEmail" placeholder="Email">
    <input type="password" id="loginSenha" placeholder="Senha">
    <button class="btn-primary" onclick="login()">Entrar</button>
    <button class="btn-gray" onclick="mostrarCadastro()">Criar conta</button>
</div>

<div class="container hidden" id="cadastroContainer">
    <h2>Criar Conta</h2>
    <input type="text" id="cadNome" placeholder="Nome completo">
    <input type="email" id="cadEmail" placeholder="Email">
    <input type="password" id="cadSenha" placeholder="Senha">
    <button class="btn-green" onclick="cadastrar()">Cadastrar</button>
    <button class="btn-gray" onclick="voltarLogin()">Voltar</button>
</div><!-- Firebase SDKs -->
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, 
             createUserWithEmailAndPassword, 
             signInWithEmailAndPassword,
             signOut } 
    from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    import { getFirestore, 
             doc, 
             setDoc, 
             getDoc,
             collection,
             addDoc,
             query,
             where,
             getDocs } 
    from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    /* SEU FIREBASE CONFIG */
    const firebaseConfig = {
        apiKey: "AIzaSyAdiqmNAyJOqsigX8_1_D8dDFQhfhcKADY",
        authDomain: "bater-ponto-cc39c.firebaseapp.com",
        projectId: "bater-ponto-cc39c",
        storageBucket: "bater-ponto-cc39c.firebasestorage.app",
        messagingSenderId: "304888003378",
        appId: "1:304888003378:web:2a0295fa03429fd13bb52b",
        measurementId: "G-Z0FB4JYVTM"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    /* ============================
       FUNÇÕES DE INTERFACE
    ============================ */

    function mostrarCadastro() {
        document.getElementById("loginContainer").classList.add("hidden");
        document.getElementById("cadastroContainer").classList.remove("hidden");
    }

    function voltarLogin() {
        document.getElementById("cadastroContainer").classList.add("hidden");
        document.getElementById("loginContainer").classList.remove("hidden");
    }

    /* ============================
       CADASTRAR USUÁRIO
    ============================ */

    window.cadastrar = async function () {
        const nome = document.getElementById("cadNome").value;
        const email = document.getElementById("cadEmail").value;
        const senha = document.getElementById("cadSenha").value;

        if (!nome || !email || !senha) {
            alert("Preencha todos os campos.");
            return;
        }

        try {
            const cred = await createUserWithEmailAndPassword(auth, email, senha);

            await setDoc(doc(db, "usuarios", cred.user.uid), {
                nome: nome,
                email: email,
                tipo: "funcionario", // padrão
                criadoEm: new Date()
            });

            alert("Conta criada com sucesso!");
            voltarLogin();

        } catch (erro) {
            alert("Erro ao cadastrar: " + erro.message);
        }
    };

    /* ============================
       LOGIN
    ============================ */

    window.login = async function () {
        const email = document.getElementById("loginEmail").value;
        const senha = document.getElementById("loginSenha").value;

        try {
            const cred = await signInWithEmailAndPassword(auth, email, senha);

            const userDoc = await getDoc(doc(db, "usuarios", cred.user.uid));

            if (!userDoc.exists()) {
                alert("Usuário sem registro no banco.");
                return;
            }

            const dados = userDoc.data();

            // Salva sessão local
            localStorage.setItem("usuarioLogado", JSON.stringify({
                uid: cred.user.uid,
                nome: dados.nome,
                tipo: dados.tipo
            }));

            // Redireciona
            if (dados.tipo === "admin") {
                mostrarAdmin();
            } else {
                mostrarFuncionario();
            }

        } catch (erro) {
            alert("Erro ao fazer login: " + erro.message);
        }
    };

    /* ============================
       LOGOUT
    ============================ */

    window.sair = async function () {
        await signOut(auth);
        localStorage.removeItem("usuarioLogado");
        location.reload();
    };

</script><!-- PAINEL DO FUNCIONÁRIO -->
<div class="container hidden" id="funcionarioContainer">
    <h2 id="nomeFuncionario"></h2>

    <h3>Status do dia</h3>
    <div id="statusDia">Carregando...</div>

    <h3>Bater ponto</h3>
    <div class="actions">
        <button class="btn-primary" onclick="baterEntrada()">Entrada</button>
        <button class="btn-gray" onclick="baterSaidaAlmoco()">Saída almoço</button>
        <button class="btn-green" onclick="baterVoltaAlmoco()">Volta almoço</button>
        <button class="btn-danger" onclick="baterSaidaFinal()">Saída final</button>
    </div>

    <br>
    <button class="btn-danger" onclick="sair()">Sair</button>
</div>

<script type="module">

    import { getFirestore, doc, setDoc, getDoc, collection, addDoc, query, where, getDocs } 
    from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    import { getAuth } 
    from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const auth2 = getAuth();
    const db2 = getFirestore();

    /* ============================
       MOSTRAR PAINEL DO FUNCIONÁRIO
    ============================ */

    window.mostrarFuncionario = async function () {
        document.getElementById("loginContainer").classList.add("hidden");
        document.getElementById("cadastroContainer").classList.add("hidden");
        document.getElementById("funcionarioContainer").classList.remove("hidden");

        const user = JSON.parse(localStorage.getItem("usuarioLogado"));
        document.getElementById("nomeFuncionario").innerText = "Olá, " + user.nome;

        carregarStatusDia();
    };

    /* ============================
       CARREGAR STATUS DO DIA
    ============================ */

    async function carregarStatusDia() {
        const user = JSON.parse(localStorage.getItem("usuarioLogado"));
        const hoje = new Date().toISOString().split("T")[0];

        const q = query(
            collection(db2, "pontos"),
            where("uid", "==", user.uid),
            where("data", "==", hoje)
        );

        const snap = await getDocs(q);

        let entrada = null;
        let saidaAlmoco = null;
        let voltaAlmoco = null;
        let saidaFinal = null;

        snap.forEach(doc => {
            const d = doc.data();
            if (d.tipo === "entrada") entrada = d.hora;
            if (d.tipo === "saidaAlmoco") saidaAlmoco = d.hora;
            if (d.tipo === "voltaAlmoco") voltaAlmoco = d.hora;
            if (d.tipo === "saidaFinal") saidaFinal = d.hora;
        });

        let status = "";

        if (!entrada) status = "Aguardando Entrada";
        else if (!saidaAlmoco) status = "Entrada registrada: " + entrada + "<br>Aguardando Saída para almoço";
        else if (!voltaAlmoco) status = "Saída almoço registrada: " + saidaAlmoco + "<br>Aguardando Volta do almoço";
        else if (!saidaFinal) status = "Volta almoço registrada: " + voltaAlmoco + "<br>Aguardando Saída final";
        else status = "Dia finalizado! Saída final: " + saidaFinal;

        document.getElementById("statusDia").innerHTML = status;
    }

    /* ============================
       VERIFICAR SE O DIA ANTERIOR ESTÁ COMPLETO
    ============================ */

    async function diaAnteriorCompleto() {
        const user = JSON.parse(localStorage.getItem("usuarioLogado"));

        const ontem = new Date(Date.now() - 86400000)
            .toISOString()
            .split("T")[0];

        const q = query(
            collection(db2, "pontos"),
            where("uid", "==", user.uid),
            where("data", "==", ontem)
        );

        const snap = await getDocs(q);

        let entrada = false;
        let saidaAlmoco = false;
        let voltaAlmoco = false;
        let saidaFinal = false;

        snap.forEach(doc => {
            const d = doc.data();
            if (d.tipo === "entrada") entrada = true;
            if (d.tipo === "saidaAlmoco") saidaAlmoco = true;
            if (d.tipo === "voltaAlmoco") voltaAlmoco = true;
            if (d.tipo === "saidaFinal") saidaFinal = true;
        });

        return entrada && saidaAlmoco && voltaAlmoco && saidaFinal;
    }

    /* ============================
       REGISTRAR PONTO
    ============================ */

    async function registrarPonto(tipo) {
        const user = JSON.parse(localStorage.getItem("usuarioLogado"));
        const hoje = new Date().toISOString().split("T")[0];
        const hora = new Date().toLocaleTimeString("pt-BR");

        // Bloqueio se o dia anterior estiver incompleto
        if (!(await diaAnteriorCompleto())) {
            alert("Você precisa completar o dia anterior antes de registrar novos pontos.");
            return;
        }

        await addDoc(collection(db2, "pontos"), {
            uid: user.uid,
            data: hoje,
            hora: hora,
            tipo: tipo
        });

        carregarStatusDia();
        alert("Ponto registrado: " + tipo.toUpperCase());
    }

    window.baterEntrada = () => registrarPonto("entrada");
    window.baterSaidaAlmoco = () => registrarPonto("saidaAlmoco");
    window.baterVoltaAlmoco = () => registrarPonto("voltaAlmoco");
    window.baterSaidaFinal = () => registrarPonto("saidaFinal");

</script><!-- PAINEL DO ADMINISTRADOR -->
<div class="container hidden" id="adminContainer">
    <h2>Painel do Administrador</h2>

    <div class="actions">
        <button class="btn-primary" onclick="listarFuncionarios()">Funcionários</button>
        <button class="btn-green" onclick="listarTodosPontos()">Todos os pontos</button>
        <button class="btn-gray" onclick="mostrarRelatorioFuncionario()">Relatório por funcionário</button>
        <button class="btn-danger" onclick="sair()">Sair</button>
    </div>

    <div id="adminConteudo" style="margin-top:20px;"></div>
</div>

<script type="module">

    import { getFirestore, collection, getDocs, doc, getDoc, query, where } 
    from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const db3 = getFirestore();

    /* ============================
       MOSTRAR PAINEL DO ADMIN
    ============================ */

    window.mostrarAdmin = function () {
        document.getElementById("loginContainer").classList.add("hidden");
        document.getElementById("cadastroContainer").classList.add("hidden");
        document.getElementById("funcionarioContainer").classList.add("hidden");
        document.getElementById("adminContainer").classList.remove("hidden");
    };

    /* ============================
       LISTAR FUNCIONÁRIOS
    ============================ */

    window.listarFuncionarios = async function () {
        const snap = await getDocs(collection(db3, "usuarios"));

        let html = `<h3>Funcionários cadastrados</h3>
                    <table>
                        <tr><th>Nome</th><th>Email</th><th>Tipo</th></tr>`;

        snap.forEach(doc => {
            const u = doc.data();
            html += `<tr>
                        <td>${u.nome}</td>
                        <td>${u.email}</td>
                        <td>${u.tipo}</td>
                    </tr>`;
        });

        html += "</table>";

        document.getElementById("adminConteudo").innerHTML = html;
    };

    /* ============================
       LISTAR TODOS OS PONTOS
    ============================ */

    window.listarTodosPontos = async function () {
        const snap = await getDocs(collection(db3, "pontos"));

        let html = `<h3>Todos os pontos registrados</h3>
                    <table>
                        <tr><th>UID</th><th>Data</th><th>Hora</th><th>Tipo</th></tr>`;

        snap.forEach(doc => {
            const p = doc.data();
            html += `<tr>
                        <td>${p.uid}</td>
                        <td>${p.data}</td>
                        <td>${p.hora}</td>
                        <td>${p.tipo}</td>
                    </tr>`;
        });

        html += "</table>";

        document.getElementById("adminConteudo").innerHTML = html;
    };

    /* ============================
       RELATÓRIO POR FUNCIONÁRIO
    ============================ */

    window.mostrarRelatorioFuncionario = async function () {
        const snap = await getDocs(collection(db3, "usuarios"));

        let html = `<h3>Relatório por funcionário</h3>
                    <select id="selectFuncionario">`;

        snap.forEach(doc => {
            const u = doc.data();
            html += `<option value="${doc.id}">${u.nome}</option>`;
        });

        html += `</select>
                 <button class="btn-primary" onclick="gerarRelatorioFuncionario()">Gerar</button>
                 <div id="relatorioFuncionario"></div>`;

        document.getElementById("adminConteudo").innerHTML = html;
    };

    /* ============================
       GERAR RELATÓRIO DE UM FUNCIONÁRIO
    ============================ */

    window.gerarRelatorioFuncionario = async function () {
        const uid = document.getElementById("selectFuncionario").value;

        const q = query(collection(db3, "pontos"), where("uid", "==", uid));
        const snap = await getDocs(q);

        let registros = {};

        snap.forEach(doc => {
            const p = doc.data();

            if (!registros[p.data]) {
                registros[p.data] = {
                    entrada: null,
                    saidaAlmoco: null,
                    voltaAlmoco: null,
                    saidaFinal: null
                };
            }

            registros[p.data][p.tipo] = p.hora;
        });

        let html = `<h3>Relatório</h3>
                    <table>
                        <tr>
                            <th>Data</th>
                            <th>Entrada</th>
                            <th>Saída almoço</th>
                            <th>Volta almoço</th>
                            <th>Saída final</th>
                            <th>Total</th>
                        </tr>`;

        for (let data in registros) {
            const r = registros[data];

            let total = calcularHoras(r);

            html += `<tr>
                        <td>${data}</td>
                        <td>${r.entrada || "-"}</td>
                        <td>${r.saidaAlmoco || "-"}</td>
                        <td>${r.voltaAlmoco || "-"}</td>
                        <td>${r.saidaFinal || "-"}</td>
                        <td>${total}</td>
                    </tr>`;
        }

        html += "</table>";

        document.getElementById("relatorioFuncionario").innerHTML = html;
    };

    /* ============================
       CÁLCULO DE HORAS
    ============================ */

    function calcularHoras(r) {
        if (!r.entrada || !r.saidaAlmoco || !r.voltaAlmoco || !r.saidaFinal)
            return "Incompleto";

        const t1 = diff(r.entrada, r.saidaAlmoco);
        const t2 = diff(r.voltaAlmoco, r.saidaFinal);

        return somarHoras(t1, t2);
    }

    function diff(h1, h2) {
        const [hA, mA, sA] = h1.split(":").map(Number);
        const [hB, mB, sB] = h2.split(":").map(Number);

        let tA = hA * 3600 + mA * 60 + sA;
        let tB = hB * 3600 + mB * 60 + sB;

        let diff = tB - tA;
        if (diff < 0) diff += 86400;

        const h = Math.floor(diff / 3600);
        const m = Math.floor((diff % 3600) / 60);

        return `${h}:${m.toString().padStart(2, "0")}`;
    }

    function somarHoras(h1, h2) {
        const [hA, mA] = h1.split(":").map(Number);
        const [hB, mB] = h2.split(":").map(Number);

        let h = hA + hB;
        let m = mA + mB;

        if (m >= 60) {
            h += 1;
            m -= 60;
        }

        return `${h}:${m.toString().padStart(2, "0")}`;
    }

</script>

</body>
</html>
